    <script>
      /* 手动注册 Service Worker — 加错误处理，避免非 HTTPS 环境白屏 */
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          var swUrl = '%BASE_URL%';
          navigator.serviceWorker.register(swUrl + 'sw.js', { scope: swUrl })
            .catch(function() { /* Safari HTTP 下 SW 注册失败不影响页面 */ });
        });
      }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
